version: "3.8"

services:
  # Redis for Pub/Sub multi-instance distribution
  redis:
    image: redis:7-alpine
    container_name: zhipm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Zhi Push Message Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zhipm-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - REALTIME_BROKER_TYPE=redis
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  redis-data:
    driver: local

networks:
  default:
    name: zhipm-network
