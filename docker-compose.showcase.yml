version: "3.8"

services:
  # Zhi PM Showcase — 演示所有功能的统一前端应用
  showcase:
    build:
      context: .
      dockerfile: samples/showcase/sample-showcase/Dockerfile.local
    container_name: zhipm-showcase
    restart: unless-stopped
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

networks:
  default:
    name: zhipm-showcase-network
