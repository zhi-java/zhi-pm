<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhi PM — 响应式 WebSocket 网关演示</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --sidebar-bg: rgba(255,255,255,0.15);
            --sidebar-blur: blur(20px);
            --card-bg: rgba(255,255,255,0.7);
            --card-blur: blur(10px);
            --card-shadow: 0 8px 32px rgba(0,0,0,0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #007AFF;
            --accent-hover: #0056CC;
            --success: #34C759;
            --warning: #FF9500;
            --error: #FF3B30;
            --border: rgba(0,0,0,0.06);
            --input-bg: rgba(255,255,255,0.5);
            --sidebar-text: rgba(255,255,255,0.7);
            --sidebar-text-active: #fff;
            --sidebar-hover: rgba(255,255,255,0.1);
            --sidebar-active: rgba(255,255,255,0.2);
            --bubble-sent: #007AFF;
            --bubble-sent-text: #fff;
            --bubble-received: rgba(255,255,255,0.8);
            --bubble-received-text: #1d1d1f;
            --log-bg: rgba(0,0,0,0.03);
            --danmaku-bg: rgba(0,0,0,0.6);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --sidebar-bg: rgba(0,0,0,0.3);
            --card-bg: rgba(30,30,30,0.8);
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --border: rgba(255,255,255,0.08);
            --input-bg: rgba(255,255,255,0.08);
            --sidebar-text: rgba(255,255,255,0.6);
            --sidebar-hover: rgba(255,255,255,0.05);
            --sidebar-active: rgba(255,255,255,0.1);
            --bubble-received: rgba(50,50,50,0.8);
            --bubble-received-text: #f5f5f7;
            --log-bg: rgba(255,255,255,0.03);
            --danmaku-bg: rgba(0,0,0,0.8);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .topbar {
            height: 48px;
            background: var(--sidebar-bg);
            backdrop-filter: var(--sidebar-blur);
            -webkit-backdrop-filter: var(--sidebar-blur);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            z-index: 10;
            flex-shrink: 0;
        }
        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--sidebar-text-active);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ws-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--sidebar-text);
        }
        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error);
            transition: background 0.3s;
        }
        .ws-dot.connected { background: var(--success); }
        .ws-dot.reconnecting { background: var(--warning); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .theme-toggle {
            background: none;
            border: none;
            color: var(--sidebar-text);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }
        .theme-toggle:hover { background: var(--sidebar-hover); }

        /* Main layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: var(--sidebar-bg);
            backdrop-filter: var(--sidebar-blur);
            -webkit-backdrop-filter: var(--sidebar-blur);
            border-right: 1px solid var(--border);
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-shrink: 0;
            overflow-y: auto;
        }
        .sidebar-section {
            font-size: 11px;
            font-weight: 600;
            color: var(--sidebar-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 12px 6px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--sidebar-text);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .nav-item:hover { background: var(--sidebar-hover); color: var(--sidebar-text-active); }
        .nav-item.active { background: var(--sidebar-active); color: var(--sidebar-text-active); font-weight: 500; }
        .nav-item i { width: 18px; height: 18px; }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .content-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Panel */
        .panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        /* Stats */
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
        }
        .stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
        .stat-value { font-size: 28px; font-weight: 700; }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--error); color: #fff; }
        .btn-danger:hover { background: #CC2F26; }
        .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-ghost:hover { background: rgba(0,122,255,0.1); }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Inputs */
        .input, .select, .textarea {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }
        .input:focus, .select:focus, .textarea:focus { border-color: var(--accent); }
        .textarea { resize: vertical; min-height: 80px; }
        .form-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .form-row .input, .form-row .select { flex: 1; }
        .form-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; display: block; }
        .form-group { margin-bottom: 12px; }

        /* Tables */
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        .table th { font-weight: 600; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-success { background: rgba(52,199,89,0.15); color: var(--success); }
        .badge-warning { background: rgba(255,149,0,0.15); color: var(--warning); }
        .badge-error { background: rgba(255,59,48,0.15); color: var(--error); }
        .badge-info { background: rgba(0,122,255,0.15); color: var(--accent); }

        /* User cards */
        .user-cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .user-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 180px;
        }
        .user-card:hover { transform: translateY(-2px); }
        .user-card.online { border-color: var(--success); }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }
        .user-info { flex: 1; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-status { font-size: 12px; color: var(--text-secondary); }

        /* Chat */
        .chat-layout { display: flex; gap: 0; height: calc(100vh - 140px); min-height: 400px; }
        .chat-sidebar {
            width: 240px;
            background: var(--card-bg);
            border-radius: 16px 0 0 16px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: 0 16px 16px 0;
        }
        .conv-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .conv-item:hover { background: var(--sidebar-hover); }
        .conv-item.active { background: var(--sidebar-active); }
        .conv-name { font-weight: 500; font-size: 14px; }
        .conv-preview { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .unread-badge {
            background: var(--error);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }
        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 15px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }
        .message-bubble.sent {
            background: var(--bubble-sent);
            color: var(--bubble-sent-text);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-bubble.received {
            background: var(--bubble-received);
            color: var(--bubble-received-text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .message-bubble.sent .message-meta { color: rgba(255,255,255,0.7); text-align: right; }
        .chat-input {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        .chat-input .input { flex: 1; }

        /* Danmaku */
        .danmaku-area {
            position: relative;
            height: 300px;
            background: var(--danmaku-bg);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .danmaku-overlay {
            position: absolute;
            top: 12px;
            left: 16px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            font-weight: 500;
        }
        .danmaku-item {
            position: absolute;
            white-space: nowrap;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            animation: danmakuFloat 8s linear forwards;
        }
        @keyframes danmakuFloat {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }
        .danmaku-input { display: flex; gap: 8px; margin-bottom: 16px; }
        .danmaku-input .input { flex: 1; }

        /* Order cards */
        .order-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .order-id { font-weight: 600; font-size: 14px; }
        .order-detail { font-size: 13px; color: var(--text-secondary); }
        .status-timeline {
            display: flex;
            gap: 0;
            margin-top: 12px;
            position: relative;
        }
        .status-step {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            position: relative;
            padding-top: 20px;
        }
        .status-step::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
        }
        .status-step.active::before { background: var(--accent); }
        .status-step.active { color: var(--accent); font-weight: 600; }

        /* Log panel */
        .log-panel {
            background: var(--log-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 16px;
            overflow: hidden;
        }
        .log-header {
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .log-body {
            max-height: 200px;
            overflow-y: auto;
            padding: 8px 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .log-entry { color: var(--text-secondary); }
        .log-entry .log-time { color: var(--text-secondary); margin-right: 8px; }
        .log-entry .log-type { color: var(--accent); margin-right: 8px; font-weight: 500; }
        .log-entry .log-data { color: var(--text-primary); }

        /* Metrics charts */
        .chart-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        canvas { width: 100%; height: 200px; }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 60px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            font-size: 14px;
            animation: slideIn 0.3s ease;
            max-width: 320px;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 12px 6px; }
            .nav-item span { display: none; }
            .sidebar-section { display: none; }
            .chat-layout { flex-direction: column; height: auto; }
            .chat-sidebar { width: 100%; border-radius: 16px 16px 0 0; max-height: 200px; }
            .chat-main { border-radius: 0 0 16px 16px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

        /* 视频模拟 */
        .video-simulation {
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460, #533483);
            background-size: 400% 400%;
            animation: videoShift 15s ease infinite;
        }
        @keyframes videoShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 20px 12px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 12px;
        }
        .video-progress {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
        }
        .video-progress-bar {
            height: 100%;
            background: #007AFF;
            width: 0%;
            animation: progressLoop 30s linear infinite;
        }
        @keyframes progressLoop {
            from { width: 0%; }
            to { width: 100%; }
        }
        .live-info {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 12px;
        }
        .live-badge {
            background: #FF3B30;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .like-btn {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: transform 0.2s;
        }
        .like-btn:active { transform: scale(1.3); }
    </style>
</head>
<body>
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-title">
            <i data-lucide="radio" style="width:20px;height:20px"></i>
            Zhi PM 演示中心
        </div>
        <div class="topbar-right">
            <div class="ws-status">
                <div class="ws-dot" id="ws-dot"></div>
                <span id="ws-label">未连接</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <i data-lucide="moon" id="theme-icon" style="width:18px;height:18px"></i>
            </button>
        </div>
    </div>

    <div class="main">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-section">功能模块</div>
            <a class="nav-item active" data-panel="presence" onclick="navigate('presence')">
                <i data-lucide="activity"></i><span>在线状态</span>
            </a>
            <a class="nav-item" data-panel="push" onclick="navigate('push')">
                <i data-lucide="send"></i><span>消息推送</span>
            </a>
            <a class="nav-item" data-panel="danmaku" onclick="navigate('danmaku')">
                <i data-lucide="radio"></i><span>直播弹幕</span>
            </a>
            <a class="nav-item" data-panel="chat" onclick="navigate('chat')">
                <i data-lucide="message-square"></i><span>聊天室</span>
            </a>
            <a class="nav-item" data-panel="orders" onclick="navigate('orders')">
                <i data-lucide="shopping-cart"></i><span>订单追踪</span>
            </a>
            <div class="sidebar-section">运维管理</div>
            <a class="nav-item" data-panel="admin" onclick="navigate('admin')">
                <i data-lucide="settings"></i><span>管理后台</span>
            </a>
            <a class="nav-item" data-panel="metrics" onclick="navigate('metrics')">
                <i data-lucide="bar-chart-3"></i><span>实时指标</span>
            </a>
        </nav>

        <!-- Content -->
        <div class="content">
            <div class="content-inner">
                <!-- Panels will be inserted here by JS -->
                <div id="panel-presence" class="panel active"></div>
                <div id="panel-push" class="panel"></div>
                <div id="panel-danmaku" class="panel"></div>
                <div id="panel-chat" class="panel"></div>
                <div id="panel-orders" class="panel"></div>
                <div id="panel-admin" class="panel"></div>
                <div id="panel-metrics" class="panel"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
    // ============================================================
    // 配置
    // ============================================================
    const BASE = '';  // same origin
    const WS_BASE = `ws://${location.host}`;

    // ============================================================
    // 状态管理
    // ============================================================
    const Store = {
        currentUser: null,
        wsClients: {},
        logs: [],
        orders: [],
        theme: localStorage.getItem('theme') || 'light',
        listeners: [],

        set(key, value) {
            this[key] = value;
            this.listeners.forEach(fn => fn(key, value));
        },

        subscribe(fn) {
            this.listeners.push(fn);
        },

        addLog(type, data, module) {
            const entry = { time: new Date().toLocaleTimeString(), type, data, module };
            this.logs.unshift(entry);
            if (this.logs.length > 200) this.logs.pop();
            this.listeners.forEach(fn => fn('log', entry));
        }
    };

    // ============================================================
    // 消息提示
    // ============================================================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toasts');
        const toast = document.createElement('div');
        toast.className = 'toast';
        const colors = { info: 'var(--accent)', success: 'var(--success)', warning: 'var(--warning)', error: 'var(--error)' };
        toast.style.borderLeft = `3px solid ${colors[type] || colors.info}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ============================================================
    // WebSocket 客户端
    // ============================================================
    class WsClient {
        constructor(name, url, userId) {
            this.name = name;
            this.url = url;
            this.userId = userId;
            this.ws = null;
            this.handlers = new Map();
            this.reconnectDelay = 1000;
            this.maxReconnectDelay = 30000;
            this.connected = false;
            this.shouldConnect = true;
            this._hasConnected = false; // 首次连接标记
        }

        connect() {
            if (this.ws && this.ws.readyState <= 1) return;
            this.ws = new WebSocket(this.url);
            this.ws.onopen = () => {
                this.connected = true;
                this.reconnectDelay = 1000;
                updateWsStatus();
                Store.addLog('CONNECT', `${this.name}: ${this.userId}`, this.name);
                // 仅首次连接显示 Toast，自动重连不显示
                if (!this._hasConnected) {
                    showToast(`${this.name} 已连接: ${this.userId}`, 'success');
                    this._hasConnected = true;
                }
                if (this._onOpenFn) this._onOpenFn();
            };
            this.ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    Store.addLog('RECV', `${msg.type}: ${JSON.stringify(msg.payload || {}).substring(0, 80)}`, this.name);
                    const handler = this.handlers.get(msg.type);
                    if (handler) handler(msg);
                    const wildcard = this.handlers.get('*');
                    if (wildcard) wildcard(msg);
                } catch (err) {
                    Store.addLog('ERROR', `Parse error: ${e.data}`, this.name);
                }
            };
            this.ws.onclose = () => {
                this.connected = false;
                updateWsStatus();
                Store.addLog('DISCONNECT', `${this.name}: ${this.userId}`, this.name);
                if (this.shouldConnect) {
                    setTimeout(() => this.connect(), this.reconnectDelay);
                    this.reconnectDelay = Math.min(this.reconnectDelay * 2, this.maxReconnectDelay);
                }
            };
            this.ws.onerror = () => {};
        }

        send(type, payload, options = {}) {
            if (!this.ws || this.ws.readyState !== 1) {
                showToast('未连接', 'error');
                return;
            }
            const msg = { type, payload, from: this.userId, timestamp: new Date().toISOString() };
            if (options.roomId) msg.roomId = options.roomId;
            if (options.to) msg.to = options.to;
            this.ws.send(JSON.stringify(msg));
            Store.addLog('SEND', `${type}: ${JSON.stringify(payload || {}).substring(0, 80)}`, this.name);
        }

        onOpen(fn) {
            this._onOpenFn = fn;
        }

        on(type, handler) {
            this.handlers.set(type, handler);
        }

        disconnect() {
            this.shouldConnect = false;
            if (this.ws) this.ws.close();
            this.connected = false;
            updateWsStatus();
        }
    }

    function updateWsStatus() {
        const clients = Object.values(Store.wsClients);
        const connected = clients.filter(c => c.connected).length;
        const dot = document.getElementById('ws-dot');
        const label = document.getElementById('ws-label');
        if (connected === 0) {
            dot.className = 'ws-dot';
            label.textContent = '未连接';
        } else if (connected < clients.length) {
            dot.className = 'ws-dot reconnecting';
            label.textContent = `${connected}/${clients.length} 个连接`;
        } else {
            dot.className = 'ws-dot connected';
            label.textContent = `${connected} 个连接`;
        }
    }

    function renderDanmakuUserBar() {
        const bar = document.getElementById('danmaku-user-bar');
        if (!bar) return;
        bar.innerHTML = DANMAKU_USERS.map(u => {
            const key = 'danmaku-' + u;
            const client = Store.wsClients[key];
            const online = client && client.connected;
            return `
                <div class="user-card ${online ? 'online' : ''}" style="min-width:140px;padding:10px 14px;cursor:pointer" onclick="danmakuToggleUser('${u}')">
                    <div class="user-avatar" style="width:32px;height:32px;font-size:13px;background:${online ? 'var(--success)' : 'var(--text-secondary)'}">${u[0].toUpperCase()}</div>
                    <div>
                        <div style="font-size:13px;font-weight:500">${u.charAt(0).toUpperCase() + u.slice(1)}</div>
                        <div style="font-size:11px;color:var(--text-secondary)">${online ? '已连接' : '离线'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderDanmakuSendAs() {
        const container = document.getElementById('danmaku-send-as');
        if (!container) return;
        const connectedUsers = DANMAKU_USERS.filter(u => Store.wsClients['danmaku-' + u]?.connected);
        if (connectedUsers.length === 0) {
            danmakuSendAs = '';
            container.innerHTML = '<span style="font-size:12px;color:var(--text-secondary)">请先连接用户</span>';
            return;
        }
        if (!connectedUsers.includes(danmakuSendAs)) danmakuSendAs = connectedUsers[0];
        container.innerHTML = connectedUsers.map(u => `
            <button class="btn btn-sm ${danmakuSendAs === u ? 'btn-primary' : 'btn-ghost'}" onclick="danmakuSetSendAs('${u}')">${u}</button>
        `).join('');
    }

    function danmakuSetSendAs(userId) {
        danmakuSendAs = userId;
        renderDanmakuSendAs();
    }

    function danmakuToggleUser(userId) {
        const key = 'danmaku-' + userId;
        const existing = Store.wsClients[key];
        if (existing && existing.connected) {
            existing.disconnect();
            delete Store.wsClients[key];
            renderDanmakuUserBar();
            renderDanmakuSendAs();
            danmakuRefreshCount();
            return;
        }
        const client = new WsClient('danmaku', `${WS_BASE}/ws?access_token=${userId}-token`, userId);
        // 监听弹幕消息
        client.on('danmaku.message', (msg) => {
            const content = msg.payload?.content || '';
            const sender = msg.from || 'unknown';
            spawnDanmaku(`${sender}: ${content}`);
        });
        // 监听房间加入确认
        client.on('room.joined', (msg) => {
            showToast(`${userId} 已加入 ${msg.payload?.roomId || DANMAKU_ROOM}`, 'success');
            danmakuRefreshCount();
        });
        // 错误处理
        client.on('danmaku.error', (msg) => {
            showToast(`[${userId}] 弹幕错误: ${msg.payload?.message || '未知'}`, 'error');
        });
        // 连接成功后自动加入房间
        client.onOpen(() => {
            client.send('room.join', { roomId: DANMAKU_ROOM }, { roomId: DANMAKU_ROOM });
            renderDanmakuUserBar();
            renderDanmakuSendAs();
            danmakuRefreshCount();
        });
        Store.wsClients[key] = client;
        client.connect();
        renderDanmakuUserBar();
    }

    function spawnDanmaku(text) {
        const screen = document.getElementById('danmaku-screen');
        if (!screen) return;
        const el = document.createElement('div');
        el.className = 'danmaku-item';
        el.textContent = text;
        el.style.top = Math.random() * 220 + 30 + 'px';
        el.style.color = `hsl(${Math.random() * 360}, 80%, 75%)`;
        screen.appendChild(el);
        setTimeout(() => el.remove(), 8000);
    }

    function danmakuSend() {
        const input = document.getElementById('danmaku-content');
        const content = input.value.trim();
        if (!content) return;
        if (!danmakuSendAs) {
            showToast('请先连接用户', 'warning');
            return;
        }
        const client = Store.wsClients['danmaku-' + danmakuSendAs];
        if (!client || !client.connected) {
            showToast('当前用户未连接', 'warning');
            return;
        }
        client.send('danmaku.send', { content, contentType: 'text' }, { roomId: DANMAKU_ROOM });
        input.value = '';
    }

        const userId = document.getElementById('danmaku-mute-user').value;

    async function danmakuUnmute() {

        await api(`/api/danmaku/rooms/${DANMAKU_ROOM}/unmute/${userId}`, { method: 'POST' });

        danmakuRefreshMuted();

    async function danmakuRefreshMuted() {

    ];

    function render_chat() {
        const existing = Store.wsClients['chat'];

    function renderConvList() {
        const list = document.getElementById('chat-conv-list');
        if (!list) return;
        list.innerHTML = chatConversations.map(c => {
            const msgs = chatMessages[c.id] || [];
            const last = msgs.length > 0 ? msgs[msgs.length - 1].content.substring(0, 30) : '暂无消息';
            return `
                <div class="conv-item ${activeConv === c.id ? 'active' : ''}" onclick="chatSelectConv('${c.id}')">
                    <div>
                        <div class="conv-name">${c.name}</div>
                        <div class="conv-preview">${last}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function chatSwitchUser() {
        const userId = document.getElementById('chat-user').value;
        if (Store.wsClients['chat']) Store.wsClients['chat'].disconnect();
        if (!userId) return;
        chatUser = userId;
        const client = new WsClient('chat', `${WS_BASE}/ws?access_token=${userId}-token`, userId);
        client.on('chat.message', (msg) => {
            const p = msg.payload || {};
            const convId = p.conversationId;
            if (!chatMessages[convId]) chatMessages[convId] = [];
            chatMessages[convId].push({ id: p.messageId, sender: p.senderId, content: p.content, time: new Date().toLocaleTimeString() });
            if (activeConv === convId) renderChatMessages(convId);
            renderConvList();
            // 自动确认
            client.send('chat.ack', { messageId: p.messageId });
        });
        Store.wsClients['chat'] = client;
        client.connect();
        setTimeout(() => {
            const status = document.getElementById('chat-status');
            if (status) {
                status.textContent = client.connected ? userId : '连接中...';
                status.className = client.connected ? 'badge badge-success' : 'badge badge-warning';
            }
        }, 500);
    }

    function chatSelectConv(convId) {
        activeConv = convId;
        const conv = chatConversations.find(c => c.id === convId);
        document.getElementById('chat-header').textContent = conv ? conv.name : convId;
        // 群聊加入房间
        if (conv && conv.type === 'group' && Store.wsClients['chat']) {
            Store.wsClients['chat'].send('room.join', { roomId: convId });
        }
        // 发送已读回执
        if (Store.wsClients['chat']) {
            Store.wsClients['chat'].send('chat.read', { conversationId: convId });
        }
        renderConvList();
        renderChatMessages(convId);
        // 加载历史
        loadChatHistory(convId);
    }

    async function loadChatHistory(convId) {
        const data = await api(`/api/chat/conversations/${convId}/history?limit=20`);
        if (data && data.messages) {
            chatMessages[convId] = data.messages.map(m => ({
                id: m.messageId, sender: m.senderId, content: m.content,
                time: new Date(m.createdAt).toLocaleTimeString()
            }));
            renderChatMessages(convId);
        }
    }

    function renderChatMessages(convId) {
        const container = document.getElementById('chat-messages');
        if (!container) return;
        const msgs = chatMessages[convId] || [];
        if (msgs.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px">暂无消息</div>';
            return;
        }
        container.innerHTML = msgs.map(m => `
            <div class="message-bubble ${m.sender === chatUser ? 'sent' : 'received'}">
                ${m.sender !== chatUser ? `<div style="font-size:12px;font-weight:600;margin-bottom:2px">${m.sender}</div>` : ''}
                <div>${m.content}</div>
                <div class="message-meta">${m.time}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    function chatSendMessage() {
        const input = document.getElementById('chat-input');
        const content = input.value.trim();
        if (!content || !activeConv || !chatUser) return;
        const client = Store.wsClients['chat'];
        if (!client || !client.connected) {
            showToast('请先连接', 'warning');
            return;
        }
        const conv = chatConversations.find(c => c.id === activeConv);
        client.send('chat.send', {
            conversationId: activeConv,
            conversationType: conv ? conv.type : 'single',
            content,
            contentType: 'text'
        });
        // 乐观更新本地消息
        if (!chatMessages[activeConv]) chatMessages[activeConv] = [];
        chatMessages[activeConv].push({ id: 'local-' + Date.now(), sender: chatUser, content, time: new Date().toLocaleTimeString() });
        renderChatMessages(activeConv);
        renderConvList();
        input.value = '';
    }

        if (Store.wsClients['orders']) Store.wsClients['orders'].disconnect();
        if (!userId) return;
        orderUser = userId;
        const client = new WsClient('orders', `${WS_BASE}/ws?access_token=${userId}-token`, userId);

    async function orderCreate() {
        if (!orderUser) { showToast('请先选择用户', 'warning'); return; }
        const product = document.getElementById('order-product').value;
        const quantity = parseInt(document.getElementById('order-quantity').value) || 1;
        const result = await api('/api/orders', { method: 'POST', body: JSON.stringify({ userId: orderUser, product, quantity }) });
        if (result && result.orderId) {
            showToast(`订单 ${result.orderId} 已创建`, 'success');
            orderRefreshList();
        }
    }

    async function orderRefreshList() {
        if (!orderUser) return;
        const data = await api(`/api/orders/user/${orderUser}`);
        const container = document.getElementById('order-list');
        if (!container || !data) return;
        const orders = data.orders || [];
        if (orders.length === 0) {
            container.innerHTML = '<div class="card"><div style="text-align:center;color:var(--text-secondary);padding:20px">暂无订单</div></div>';
            return;
        }
        container.innerHTML = orders.map(o => {
            const statusIndex = ORDER_STATUSES.indexOf(o.status);
            return `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id">${o.orderId}</span>
                        <span class="badge ${o.status === 'COMPLETED' ? 'badge-success' : 'badge-info'}">${o.status}</span>
                    </div>
                    <div class="order-detail">${o.product} x ${o.quantity}</div>
                    <div class="status-timeline">
                        ${ORDER_STATUSES.map((s, i) => `<div class="status-step ${i <= statusIndex ? 'active' : ''}">${s}</div>`).join('')}
                    </div>
                    ${statusIndex < ORDER_STATUSES.length - 1 ? `
                        <div style="margin-top:12px">
                            <button class="btn btn-sm btn-ghost" onclick="orderAdvance('${o.orderId}', '${ORDER_STATUSES[statusIndex + 1]}')">
                                推进至 ${ORDER_STATUSES[statusIndex + 1]}
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        }).join('');
    }

    async function orderAdvance(orderId, status) {
        await api(`/api/orders/${orderId}/status`, { method: 'POST', body: JSON.stringify({ status }) });
        orderRefreshList();
    }

        if (!tbody || !conns) return;
        if (conns.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-secondary)">暂无连接</td></tr>';
            return;
        }
        tbody.innerHTML = conns.map(c => `
            <tr>
                <td style="font-family:monospace;font-size:12px">${c.sessionId?.substring(0, 12)}...</td>
                <td>${c.userId}</td>
                <td>${c.connectedAt ? new Date(c.connectedAt).toLocaleTimeString() : '-'}</td>
                <td>${c.lastHeartbeatAt ? new Date(c.lastHeartbeatAt).toLocaleTimeString() : '-'}</td>
                <td><button class="btn btn-sm btn-danger" onclick="adminKick('${c.sessionId}')">踢出</button></td>
            </tr>
        `).join('');
    }

    async function adminLoadRooms() {
        const rooms = await api('/admin/api/rooms');
        const tbody = document.getElementById('admin-room-table');
        if (!tbody || !rooms) return;
        if (rooms.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-secondary)">暂无房间</td></tr>';
            return;
        }
        tbody.innerHTML = rooms.map(r => `
            <tr>
                <td>${r.roomId}</td>
                <td>${r.memberCount}</td>
                <td><button class="btn btn-sm btn-ghost" onclick="adminViewMembers('${r.roomId}')">成员</button></td>
            </tr>
        `).join('');
    }

    async function adminKick(sessionId) {
        if (!confirm(`Kick session ${sessionId}?`)) return;
        await api(`/admin/api/connections/${sessionId}`, { method: 'DELETE' });
        showToast('连接已踢出', 'warning');
        adminLoadConnections();
    }

    async function adminViewMembers(roomId) {
        const data = await api(`/admin/api/rooms/${roomId}/members`);
        if (data) {
            const members = data.map(m => m.userId).join(', ');
            showToast(`房间 ${roomId}: ${members}`, 'info');
        }
    }

    async function adminBroadcast() {
        const msg = document.getElementById('admin-broadcast-msg').value;
        if (!msg) return;
        const result = await api('/admin/api/broadcast', { method: 'POST', body: JSON.stringify({ type: 'admin.broadcast', payload: { message: msg } }) });
        showToast(`广播已发送至 ${result?.sent || 0} 个连接`, 'success');
    }

    // ============================================================
    // 实时指标模块
    // ============================================================
    let metricsInterval = null;
    let metricsHistory = { connections: [], messages: [], successRate: [] };
    const METRICS_MAX_POINTS = 60;

    function render_metrics() {
        if (metricsInterval) clearInterval(metricsInterval);
        const panel = document.getElementById('panel-metrics');
        panel.innerHTML = `
            <div class="card-grid" id="metrics-stats"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="chart-container">
                    <div class="chart-title">活跃连接数</div>
                    <canvas id="chart-connections"></canvas>
                </div>
                <div class="chart-container">
                    <div class="chart-title">成功率 (%)</div>
                    <canvas id="chart-success"></canvas>
                </div>
            </div>
        `;
        metricsHistory = { connections: [], messages: [], successRate: [] };
        metricsRefresh();
        metricsInterval = setInterval(metricsRefresh, 2000);
    }

    async function metricsRefresh() {
        const stats = await api('/admin/api/stats');
        if (!stats) return;
        const now = new Date().toLocaleTimeString();
        metricsHistory.connections.push(stats.activeConnections || 0);
        metricsHistory.successRate.push((stats.pushSuccessRate || 1) * 100);
        if (metricsHistory.connections.length > METRICS_MAX_POINTS) {
            metricsHistory.connections.shift();
            metricsHistory.successRate.shift();
        }
        const container = document.getElementById('metrics-stats');
        if (container) {
            container.innerHTML = `
                <div class="stat-card"><div class="stat-label">连接数</div><div class="stat-value">${stats.activeConnections || 0}</div></div>
                <div class="stat-card"><div class="stat-label">用户数</div><div class="stat-value">${stats.onlineUsers || 0}</div></div>
                <div class="stat-card"><div class="stat-label">房间数</div><div class="stat-value">${stats.activeRooms || 0}</div></div>
                <div class="stat-card"><div class="stat-label">推送成功率</div><div class="stat-value">${((stats.pushSuccessRate || 1) * 100).toFixed(1)}%</div></div>
            `;
        }
        drawChart('chart-connections', metricsHistory.connections, '#007AFF');
        drawChart('chart-success', metricsHistory.successRate, '#34C759', 0, 100);
    }

    function drawChart(canvasId, data, color, minVal, maxVal) {
        const canvas = document.getElementById(canvasId);
        if (!canvas || data.length < 2) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        const w = rect.width, h = rect.height;
        const padding = { top: 10, right: 10, bottom: 20, left: 40 };
        const plotW = w - padding.left - padding.right;
        const plotH = h - padding.top - padding.bottom;
        ctx.clearRect(0, 0, w, h);
        const min = minVal !== undefined ? minVal : Math.min(...data) * 0.9;
        const max = maxVal !== undefined ? maxVal : Math.max(...data) * 1.1 || 1;
        // 网格线
        ctx.strokeStyle = 'rgba(0,0,0,0.06)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
            const y = padding.top + (plotH / 4) * i;
            ctx.beginPath();
            ctx.moveTo(padding.left, y);
            ctx.lineTo(w - padding.right, y);
            ctx.stroke();
            ctx.fillStyle = '#86868b';
            ctx.font = '11px -apple-system, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText((max - (max - min) * (i / 4)).toFixed(0), padding.left - 6, y + 4);
        }
        // 折线
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        data.forEach((val, i) => {
            const x = padding.left + (plotW / (data.length - 1)) * i;
            const y = padding.top + plotH - ((val - min) / (max - min)) * plotH;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        // 填充
        const lastX = padding.left + plotW;
        const lastY = padding.top + plotH - ((data[data.length - 1] - min) / (max - min)) * plotH;
        ctx.lineTo(lastX, padding.top + plotH);
        ctx.lineTo(padding.left, padding.top + plotH);
        ctx.closePath();
        ctx.fillStyle = color.replace(')', ',0.1)').replace('rgb', 'rgba');
        ctx.fill();
    }

    // 弹幕点赞
    let danmakuLikeCount = 0;
    function danmakuLike() {
        danmakuLikeCount++;
        const el = document.getElementById('danmaku-like-count');
        if (el) el.textContent = danmakuLikeCount;
    }

    // 生成示例订单
    async function orderGenerateSamples() {
        if (!orderUser) { showToast('请先选择用户', 'warning'); return; }
        const samples = [
            { product: 'MacBook Pro 16"', quantity: 1 },
            { product: 'iPhone 16 Pro', quantity: 2 },
            { product: 'AirPods Pro', quantity: 3 }
        ];
        for (const s of samples) {
            await api('/api/orders', { method: 'POST', body: JSON.stringify({ userId: orderUser, ...s }) });
        }
        // 推进第一个订单到 PAID
        const data = await api(`/api/orders/user/${orderUser}`);
        if (data?.orders?.length > 0) {
            const first = data.orders[0];
            await api(`/api/orders/${first.orderId}/status`, { method: 'POST', body: JSON.stringify({ status: 'PAID' }) });
        }
        // 推进第二个订单到 SHIPPING
        if (data?.orders?.length > 1) {
            const second = data.orders[1];
            await api(`/api/orders/${second.orderId}/status`, { method: 'POST', body: JSON.stringify({ status: 'PAID' }) });
            await api(`/api/orders/${second.orderId}/status`, { method: 'POST', body: JSON.stringify({ status: 'SHIPPING' }) });
        }
        showToast('示例订单已生成', 'success');
        orderRefreshList();
    }
